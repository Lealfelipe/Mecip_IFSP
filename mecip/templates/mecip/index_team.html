{% extends "global/base.html" %}

{% block content %}
{% if page_obj %}
    <div class="responsive_table">
        <table class="contacts-table">
            <caption class="table-caption">
                Equipes
            </caption>
            <thead>
                <tr class="table-row table-row-header">
                    <th class="table-header">Nome Equipe</th>
                    <th class="table-header">Campus</th>
                    <th class="table-header">Cidade</th>
                </tr>
            </thead>

            <tbody>
                {% for team in page_obj  %}
                    <tr class="table-row">
                        <td class="table-cel">
                            <a class="table-link" 
                            href="{% url "mecip:team" team.id %}">
                                {{ team.team_name }}
                            </a>
                        </td>
                        <td class="table-cel">
                            <a class="table-link" href="{% url "mecip:team" team.id %}">
                                {{ team.campus.campus_name }}
                            </a>
                        </td>
                        <td class="table-cel">
                            <a class="table-link" href="{% url "mecip:team" team.id %}">
                                {{ team.campus.city }}
                            </a>                            
                        </td>
                    </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>
{% else %}
    <div class="single-contact">
        <h1 class="single-contact-name">
            Nenhuma equipe encontrada.
        </h1>
    </div>
{% endif %}
{% endblock content %}
